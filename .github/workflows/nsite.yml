name: Deploy nsite

on:
  workflow_dispatch:

concurrency:
  group: "nsite"
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/_build-site.yml
    with:
      vitepress-base: "/"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download site
        uses: actions/download-artifact@v4
        with:
          name: site

      - name: Download examples dist
        uses: actions/download-artifact@v4
        with:
          name: examples-dist

      - name: Download vitepress dist
        uses: actions/download-artifact@v4
        with:
          name: vitepress-dist

      - name: Extract artifacts
        run: |
          tar -xf site.tar
          tar -xf examples-dist.tar
          tar -xf vitepress-dist.tar
          rm site.tar examples-dist.tar vitepress-dist.tar

      # Pushes to next deploy to the "next" build channel for testing
      - name: Deploy next version
        if: github.ref == 'refs/heads/next'
        uses: sandwichfarm/nsite-action@v0.3.1
        with:
          nbunksec: ${{ secrets.NSITE_BUNKER }}
          directory: "./docs"
          name: next

      - name: Deploy next examples
        if: github.ref == 'refs/heads/next'
        uses: sandwichfarm/nsite-action@v0.3.1
        with:
          nbunksec: ${{ secrets.NSITE_BUNKER }}
          directory: "./apps/examples/dist"
          name: examples
          title: Applesauce Examples
          description: A collection of mini react examples for applesauce

      - name: Deploy next docs
        if: github.ref == 'refs/heads/next'
        uses: sandwichfarm/nsite-action@v0.3.1
        with:
          nbunksec: ${{ secrets.NSITE_BUNKER }}
          directory: "./apps/docs/.vitepress/dist"
          name: docs
          title: Applesauce Documentation
          description: Markdown documentation for applesauce

      # Pushes to master deploy the latest stable version.
      - name: Deploy release
        if: github.ref == 'refs/heads/master'
        uses: sandwichfarm/nsite-action@v0.3.1
        with:
          nbunksec: ${{ secrets.NSITE_BUNKER }}
          directory: "./docs"
