name: Build packages

on:
  workflow_call:
    outputs:
      artifact:
        description: Name of the uploaded packages-dist artifact
        value: packages-dist

jobs:
  packages:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Bundle package dist
        run: tar -cf packages-dist.tar packages/*/dist

      - name: Upload package dist
        uses: actions/upload-artifact@v4
        with:
          name: packages-dist
          path: packages-dist.tar
          if-no-files-found: error
          retention-days: 1
